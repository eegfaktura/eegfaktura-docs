name: Deploy MkDocs to Pages

# NOTE: This repository is a fork. GitHub does not run push-triggered workflows
# on forks, so the `push` trigger below does NOT fire on merges to main — deploy
# manually after merging docs changes:
#   gh workflow run deploy.yml --repo eegfaktura/eegfaktura-docs --ref main
# (or Actions tab -> Run workflow). The `push` trigger is kept so auto-deploy
# resumes automatically if the repo is ever detached from its fork network.
# See CONTRIBUTING.md -> Publishing.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - run: pip install -r requirements.txt

      - run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
